name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Crear release y subir assets en ESTE repo (TopoDuctor). El PAT del usuario a veces da 403 aquí.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Push del cask a otro repo: PAT con Contents: write en brandonhsz/homebrew-tap (nombre del secret en Settings).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
