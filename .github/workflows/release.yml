name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # PAT with repo access to this repo AND to brandonhsz/homebrew-tap (contents: write on both).
          # The default GITHUB_TOKEN cannot push to another repository, so a personal access token is required.
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
